    function addToSheet(sheet, columns, record) {
        let
            id,
            value,
            column = [];

        columns.header.forEach(col=>{
            switch (col.id) {
                case "ifAnyFlags":{
                    if (record.ifAnyFlag) {
                        record.ifAnyFlag.forEach(flag=>{
                            let
                                marker = "FL:"+flag;
                            if (!sheet.stats[marker])
                                sheet.stats[marker] = 0;
                            sheet.stats[marker]++;
                            column.push(marker);
                        })
                    } else {
                        column.push("FL:ANY")
                    }
                    break;
                }
                case "tags":{
                    record.tags.forEach(tag=>{
                        if (!col.except || (col.except.indexOf(tag)==-1)) {
                            let
                                marker = "T:"+tag;
                            if (!sheet.stats[marker])
                                sheet.stats[marker] = 0;
                            sheet.stats[marker]++;
                            column.push(marker);
                        }
                    })
                    break;
                }
            }
        });

        columns.data.split(".").forEach(part=>{
            record = record[part];
        })

        id = column.join("_");

        if (!sheet.data[id]) {
            sheet.data[id] = [];
            sheet.columns.push({
                values:column,
                id:id
            });
        }

        sheet.data[id].push(record);

    }

    function setCell(table,x,y,value) {
        if (!table[y])
            table[y] = [];
        table[y][x] = value;
    }

    function exportDataset(set) {
        let
            rules = set.export,
            sheet = { stats:{}, columns:[], data:{} },
            table = [],
            csv = "",
            headerSize = 0,
            elements = DATABASE.filter(e=>{
                let
                    isOk = true;
                if (rules.filter) {
                    if (rules.filter.tags) {
                        rules.filter.tags.forEach(tag=>{
                            if (e.tags.indexOf(tag) == -1)
                                isOk = false;
                        })
                    }
                    if (rules.filter.excludeTags) {
                        rules.filter.excludeTags.forEach(tag=>{
                            if (e.tags.indexOf(tag) != -1)
                                isOk = false;
                        })
                    }
                }
                return isOk;
            });

        if (set.export.simpleTable) {

            table.push(set.export.simpleTable.map(column=>column.id));

            elements.forEach(element=>{
                table.push(set.export.simpleTable.map(column=>{
                    let
                        value = element;

                    switch (column.macro) {
                        case "ifAnyFlag":{
                            value = element.ifAnyFlag ? element.ifAnyFlag[0][0] : "";
                            break;
                        }
                        case "tags":{
                            value = element.tags.filter(tag=>column.exclude.indexOf(tag)==-1);
                            break;
                        }
                        case "requireFind":{
                            value = "";
                            if (element.requires) {
                                element.requires.forEach(require=>{
                                    if (require.id == column.find)
                                        value = require.call;
                                })
                            }
                            break;
                        }
                        case "requireExclude":{
                            value = [];
                            if (element.requires) {
                                element.requires.forEach(require=>{
                                    if (column.exclude.indexOf(require.id) == -1)
                                        value.push(require);
                                })
                            }
                            if (!value.length)
                                value=null;
                            break;
                        }
                        case "findTag":{
                            value = value.tags.indexOf(column.tag) != -1;
                            break;
                        }
                        default:{
                            column.data.split(".").forEach(part=>{
                                value = value[part];
                            });
                        }
                    }
                    
                    switch (column.type) {
                        case "lazyboolean":{
                            if (value)
                                return "yes";
                            else
                                return "";
                        }
                        case "stringlist":{
                            if (value)
                                return value.join(",");
                            break;
                        }
                        case "lazystring":
                        case "string":{
                            return value;
                        }
                        case "json":{
                            return value === null ? "" : JSON.stringify(value);
                        }
                        default:{
                            console.error("Unknow simpletable column type",column.type)
                        }
                    }
                }))
            })

            table.forEach(row=>{
                csv+=row.join("\t")+"\n";
            })

        } else {

            elements.forEach(element=>{
                addToSheet(sheet, rules.columns, element);
            });

            sheet.columns.forEach(column=>{
                if (column.values.length > headerSize)
                    headerSize = column.values.length;
            });

            setCell(table,0,headerSize,"---");
            headerSize++;

            sheet.columns.forEach((column,pos)=>{
                column.values.forEach((value,id)=>{
                    setCell(table,pos,id,value);
                })
                sheet.data[column.id].forEach((data,id)=>{
                    setCell(table,pos,headerSize+id,data);
                })
            });

            for (let i=0;i<table.length;i++) {
                let
                    row = table[i];
                if (row && row.length) {
                    for (let j=0;j<row.length;j++) {
                        csv+=(row[j]||"")+"\t";
                    }
                    csv = csv.substr(0,csv.length-1)+"\n";
                } else {
                    csv+="\n";
                }
            }

        }

        return csv;
    }

    function buildStructure(model, column, value, progressive) {
        if (typeof model == "object") {
            let
                copy;
            if (Array.isArray(model)) {
                copy = [];
                for (let i=0;i<model.length;i++) {
                    let
                        newValue = buildStructure(model[i], column, value, progressive);
                    copy[i] = newValue;
                }
                return copy;
            } else if (model._PUTHERE) {
                switch (model._PUTHERE) {
                    case "value":{
                        return value;
                    }
                    case "tags":{
                        return column.tags;
                    }
                    case "ifAnyFlags":{
                        return column.ifAnyFlags;
                    }
                    case "progressive":{
                        return model.prefix+(model.addTag ? column.tags[model.addTag] : "")+"-"+progressive;
                    }
                    case "column":{
                        return value[model.id];
                    }
                    case "solveRequires":{
                        let
                            out = [];
                        value.replace(/([a-z]+)\(\)/g,(m,m1)=>{
                            if (model.set[m1]) {
                                out = out.concat(model.set[m1].add);
                            } else {
                                console.error("Can't add requirement for",m1);
                            }
                        })
                        return out.length ? out : null;
                        break;
                    }
                }
            } else {
                copy = {};
                for (let k in model) {
                    let
                        newValue = buildStructure(model[k], column, value, progressive);

                    if ((newValue !== null) && (newValue !== undefined))
                        copy[k] = newValue;
                }
                return copy;
            }
        } else return model;
    }

    function jsonFormatter(obj,tabs, keeponeline,prevkey) {
        let
            out = "";
        if (!tabs)
            tabs = "";
        if (typeof obj == "object") {
            if (Array.isArray(obj)) {
                let
                    elements = [];
                
                for (let i=0;i<obj.length;i++) {
                    let
                        newValue = jsonFormatter(obj[i], tabs+"\t", (prevkey == "requires" || prevkey == "methods" || prevkey == "resultTable" ) ? true : keeponeline, prevkey);
                    elements.push(keeponeline ? newValue : tabs+"\t"+newValue);
                }
                if (elements.length)
                    if (keeponeline)
                        return "[ "+elements.join(", ")+" ]";
                    else
                        return "[\n"+elements.join(",\n")+"\n"+tabs+"]";
                else
                    return "[]";
            } else {
                let
                    count = 0,
                    elements = [];

                for (let k in obj)
                    count++;

                for (let k in obj) {
                    let
                        newValue = jsonFormatter(obj[k], tabs+"\t", k=="ifAnyFlag" || k == "tags" ? true : keeponeline,k);
                    if (((k=="ifAnyFlag") && newValue == "[ [] ]") || (newValue === null)) {
                        // Skip empty ifAnyFlags
                    } else {
                        elements.push(keeponeline ? k+": "+newValue : tabs+"\t"+k+": "+newValue);
                    }
                }

                if (elements.length)
                    if (keeponeline)
                        return "{ "+elements.join(", ")+" }";
                    else
                        return "{\n"+elements.join(",\n")+"\n"+tabs+"}";
                else
                    return "{}";
            }
        } else if (typeof obj == "string") {
            return "\""+obj.replace(/"/g,"\\\"")+"\""
        } else
            return obj;
    }

    function importDataset(set, data) {
        let
            errors = [],
            result = [],
            sheet = [],
            index = {},
            json,
            olddata,
            parts,
            pos = 0;

        if (set.export.simpleTable) {
            let
                header = [];

            data = data.split("\n");

            data.forEach((row,id)=>{
                if (row.trim()) {
                    row = row.split("\t");
                    if (!pos) {
                        row.forEach((cell,id)=>{
                            set.export.simpleTable.forEach(column=>{
                                if (column.id == cell) {
                                    header[id] = column;
                                }
                            })
                        })
                    } else {
                        let
                            record = {},
                            value = {};

                        header.forEach((column,pos)=>{
                            let
                                value = row[pos];

                            switch (column.type) {
                                case "lazyboolean":{
                                    value = value.trim();
                                    if (value)
                                        value = true;
                                    else
                                        value = null;
                                    break;
                                }
                                case "stringlist":{
                                    value = value.trim();
                                    if (value)
                                        value = value.split(",");
                                    else
                                        value = [];
                                    if (column.append) {
                                        value = value.concat(column.append);
                                    }
                                    break;
                                }
                                case "lazystring":{
                                    value = value.trim();
                                    if (!value)
                                        value = null;
                                    break;
                                }
                                case "string":{
                                    break;
                                }
                                case "json":{
                                    value = value.trim();
                                    if (value)
                                        value = JSON.parse(value);
                                    else
                                        value = null;
                                    break;
                                }
                                default:{
                                    console.error("Wrong column type",column.type);
                                }
                            }

                            if (column.macro == "ifAnyFlag")
                                if (value)
                                    value = [ value ];
                                else
                                    value = [];

                            if (value !== null)
                                record[column.id] = value;

                        });

                        if ((record.value===undefined) || !index[record.value] || (set.import.allowDuplicates && set.import.allowDuplicates.indexOf(record.value)!=-1) ) {
                            index[record.value]=record;
                            result.push(buildStructure(set.import.structure,0,record,pos));
                        } else {
                            errors.push("Duplicate value "+record.value+": "+JSON.stringify(record)+" and "+JSON.stringify(index[record.value]));
                        }

                    }

                    pos++;

                }
                
            })

            json = result.map(obj=>jsonFormatter(obj)).join(",");

     } else {

            data = data.trim();
            
            do {
                olddata = data;
                data = data.replace(/\t+\n/g,"\n\n");
                data = data.replace(/\n\n\n/g,"\n\n");
            } while (olddata != data);

            parts = data.split("---\n");

            if (parts.length == 2) {

                parts[0].split("\n").forEach(row=>{
                    row.split("\t").forEach((name,id)=>{
                        name = name.trim();
                        if (name) {
                            let
                                nameparts = name.split(":");
                            if (!sheet[id]) {
                                sheet[id] = { ifAnyFlags:[], tags:[], data:[] };
                            }
                            switch (nameparts[0]) {
                                case "FL":{
                                    if (nameparts[1] != "ANY")
                                        sheet[id].ifAnyFlags.push(nameparts[1]);
                                    break;
                                }
                                case "T":{
                                    sheet[id].tags.push(nameparts[1]);
                                    break;
                                }
                            }
                        }
                    })
                })

                parts[1].split("\n").forEach(row=>{
                    row.split("\t").forEach((value,id)=>{
                        value = value.trim();
                        if (value) {
                            let
                                debugId = sheet[id].ifAnyFlags.join(",")+"/"+sheet[id].tags.join(",");
                            if (!index[value] || (set.import.allowDuplicates && set.import.allowDuplicates.indexOf(value)!=-1) ) {
                                index[value] = debugId;
                                sheet[id].data.push(value);
                            } else {
                                errors.push("Duplicate value "+value+": "+debugId+" and "+index[value]);
                            }
                        }
                    })
                });

                let
                    progressive = 0;
                sheet.forEach(column=>{
                    column.data.forEach(value=>{
                        progressive++;
                        result.push(buildStructure(set.import.structure,column,value,progressive));
                    })
                })

                json = result.map(obj=>jsonFormatter(obj)).join(",");

            } else {
                errors.push("Can't process data");
            }

        }

        return {
            json:json,
            errors:errors
        };
    }

            ],
            out = "<table><tr><td></td>",
            sheet = { columns:[], rows:[], sets:[], values:{}, totals:{}, rowIndex:{} };

        DATABASE.forEach(data=>{

                data.ifAnyFlag.forEach(set=>{

                    })
                });
            else
                column.push("ANY");

            data.tags.forEach(tag=>{
                row.push(tag);
                if (EXCLUDE.indexOf(tag)!=-1)
                    isOk = false;
            });

            if (isOk) {

                column = column.join(",");
                rowKey = row.join(",");

                if (sheet.columns.indexOf(column) == -1) {
                    sheet.columns.push(column);
                    sheet.values[column] = {};
                    sheet.sets[column] = {};
                }
                if (sheet.rows.indexOf(rowKey) == -1) {
                    sheet.rows.push(rowKey);
                    sheet.totals[rowKey] = 0;
                }
                
                if (!sheet.values[column][rowKey]) {
                    sheet.values[column][rowKey] = 0;
                    sheet.sets[column][rowKey] = [];
                }

                sheet.values[column][row]++;
                sheet.sets[column][row].push(data);
                sheet.totals[row]++;
                sheet.rowIndex[rowKey] = row;

            }

        });

        sheet.rows.sort((a,b)=>{
            if (sheet.totals[a] < sheet.totals[b])
                return 1;
            else if (sheet.totals[a] > sheet.totals[b])
                return -1;
            else
            if (a>b)
                return 1;
            else if (a<b)
                return -1;
            else
                return 0;
        });


        sheet.columns.forEach(column=>{
            out+="<td>"+column+"</td>";
        })
        out+="</tr>";

        let
            errorsCount = 0;

        sheet.rows.forEach(row=>{
            let
                allColumns = 0,
                superColumns = 0,
                overColumns = 0,
                underColumns = 0,
                untrackedColumns = 0,
                errorSymbol = "",
                errorAlt = "",
                rowHtml = "",
                rowData = sheet.rowIndex[row],
                rowLimit,
                limitAmount;

            LIMITS.forEach(limit=>{
                let
                    isOk = true;

                limit.tags.forEach(tag=>{
                    if (rowData.indexOf(tag)==-1)
                        isOk = false;
                });

                if (isOk) {
                    rowLimit = limit;
                    limitAmount = limit.amount;
                }
            })

            sheet.columns.forEach(column=>{
                let
                    isColumn,
                    value = sheet.values[column][row] || 0,
                    isUnder = rowLimit && (value<limitAmount),
                    isOver = rowLimit && (value>limitAmount),
                    isSuper = rowLimit && (value>=limitAmount*1.5);

                if (value)
                    allColumns++;
                if (isOver)
                    overColumns++;
                if (isSuper)
                    superColumns++;

                if (rowLimit && (rowLimit.for.indexOf(column) != -1)) {
                    isColumn = true;
                }

                if (rowLimit) {
                    if (isColumn)
                        if (isUnder) {
                            underColumns++;
                            rowHtml+="<td style='background-color:red;color:white'>"+value+" <span style='font-size:10px'>(-"+(limitAmount-value)+")</span></td>";
                        } else
                            rowHtml+="<td style='background-color:green'>"+value+(value>limitAmount ? " <span style='font-size:10px'>(+"+(value-limitAmount)+")</span>" : "")+(isSuper ? " &#129751;" : "")+"</td>";
                    else if (value) {
                        untrackedColumns++;
                        rowHtml+="<td style='background-color:red;color:white'>"+value+"</td>";
                        console.warn("Untracked",column,",",row,"=",sheet.sets[column][row]);
                    } else {
                        rowHtml+="<td></td>";
                    }
                } else {
                    if (value)
                        rowHtml+="<td>"+value+"</td>";
                    else
                        rowHtml+="<td></td>";
                }
            })

            if (rowLimit) {
                if (untrackedColumns) {
                    errorSymbol = "&#128269;";
                    errorAlt = "Untracked data";
                } else if (underColumns) {
                    errorSymbol = "&#127964;";
                    errorAlt = "Missing entries";
                } else if (allColumns == overColumns) {
                    errorSymbol = "&#129751; <span style='font-size:10px'>("+limitAmount+")</span>";
                    errorAlt = "All columns are spilling. Raise the check limit.";
                }
            } else {
                errorSymbol = "&#128220;";
                errorAlt = "Missing check for this row.";
            }

            if (errorSymbol) {
                rowHtml = "<td style='background-color:red;color:white' title='"+errorAlt+"'><b>"+row+"</b> "+errorSymbol+"</td>"+rowHtml;
                errorsCount++;
            } else
                rowHtml="<td>"+row+"</td>"+rowHtml;

            out+="<tr>"+rowHtml+"</tr>";
        })

        out+="</table>";

        if (errorsCount) {
            out = "<div style='padding:5px;margin:5px 0;background-color:#f00;color:#fff'>"+errorsCount+" error(s)</div>"+out;
        } else {
            out = "<div style='padding:5px;margin:5px 0;background-color:green;color:#fff'>Everything looks OK!</div>"+out;
        }

        return out;

    }

    function makeGraphViz(DATABASE) {
        let
            errors = [],
            links = [],
            pool = 0,
            oneOf = 0,
            cache = {},
            found = {},
            settings = {};

        function filterId(id) {
            return !id.startsWith("roll-") &&!id.startsWith("stat-")
        }

        function filterDatabaseByTags(caller, tags,except) {
            return DATABASE.filter(entry=>{
                if (!except || (except.indexOf(entry) == -1)) {
                    let
                        found = true;
                    tags.forEach(tag=>{
                        if (!entry.tags || (entry.tags.indexOf(tag) == -1))
                            found = false;
                    })
                    return found;
                }
            })
        }

        function formatId(id) {
            return id.replace(/-[0-9]*$/,"-*");
        }

        function addConnection(from,to,details) {
            let
                uid = from+"*"+to;

            if (!cache[uid]) {
                links.push([from,to,details]);
                cache[uid] = true;
            }

            found[from] = true;
            found[to] = true;
        }

        DATABASE.forEach(element=>{
            let
                id = formatId(element.id);
            if (filterId(id))
                if (element.requires)
                    element.requires.forEach(requirement=>{
                        if (requirement.ofTags)
                            requirement.ofTags.forEach(set=>{
                                let
                                    count = 0,
                                    entries = filterDatabaseByTags(0, set);

                                if (entries.length > 1) {
                                    let
                                        oneOfId = requirement.id+"-"+(requirement.times ? "x"+requirement.times : "x1");//+"-"+(oneOf++);
                                    addConnection(id,oneOfId,[]);
                                    entries.forEach(entry=>{
                                        if (filterId(entry.id)) {
                                            addConnection(formatId(entry.id),oneOfId,[]);
                                            count++;
                                        }
                                    })
                                    settings[oneOfId] = [["shape","tab"],["style","filled"],["fontcolor","white"],["color",count > 1 ? "green" : "red"]];
                                } else {
                                    entries.forEach(entry=>{
                                        if (filterId(entry.id)) {
                                            addConnection(id,formatId(entry.id),[["color","\"red\""]]);
                                            count++;
                                        }
                                    })
                                }
                            })
                        if (requirement.ofTagBags) {

                            requirement.ofTagBags.forEach(set=>{
                                let
                                    count = 0,
                                    entries = filterDatabaseByTags(0, set),
                                    times = requirement.times || 1;

                                if (entries.length > 1) {
                                        let
                                            oneOfId = requirement.id+"-"+(requirement.times ? "x"+requirement.times : "x1");//+"-"+(oneOf++);
                                        addConnection(id,oneOfId,[]);
                                        entries.forEach(entry=>{
                                            if (filterId(entry.id)) {
                                                addConnection(formatId(entry.id),oneOfId,[]);
                                                count++;
                                            }
                                        })
                                        settings[oneOfId] = [["shape","invhouse"],["style","filled"],["fontcolor","white"],["color",count > times ? "green" : "red"]];
                                    } else {
                                        entries.forEach(entry=>{
                                            if (filterId(entry.id)) {
                                                addConnection(id,formatId(entry.id),[["color","\"orange\""]]);
                                                count++;
                                            }
                                        })
                                    }
                            });
                        }
                    })
        })

        DATABASE.forEach(element=>{
            let
                id = formatId(element.id);
            if (filterId(id) && !found[id]) {
                errors.push("Can't place in graph due to no references: "+element.id);
            }
        });

        out="";

        for (let k in settings) {
            out+="\t\""+k+"\" [";
            settings[k].forEach(pair=>out+=pair[0]+"="+pair[1]+",");
            out=out.substr(0,out.length-1)+"];\n";
        }

        links.forEach(link=>{
            out+="\t\""+link[0]+"\" -> \""+link[1]+"\"";
            if (link[2].length) {
                out+=" [";
                link[2].forEach(pair=>out+=pair[0]+"="+pair[1]+",");
                out=out.substr(0,out.length-1)+"];";
            }
            out+="\n";
        })

        return {
            errors:errors,
            text:"digraph G {\n\tlayout=twopi\n\tranksep=6;\n\tratio=auto;\n\n"+out+"}"
        };
    }

    function performDataCleanCheck() {
        let
            SENTENCES_WHITELIST = [
                /^God Toughness$/,
                /^Its presence presses against the mind.$/,
                /toughnessStat/g,
                /strengthStat/g,
            ],
            infos = { virtualStats:{} },
            errors = [];

        function isSentenceWhitelisted(s) {
            let
                isOk = false;
            SENTENCES_WHITELIST.forEach(reg=>{
                if (s.match(reg)) {
                    isOk = true;
                }
            })
            return isOk;
        }

        function find(n,root) {
            for (let k in n) {
                if (typeof n[k] == "string") {
                    if (
                        (n[k].match(/d[0-9]/)) &&
                        !root.startsWith("roll-") &&
                        !(root.endsWith(".ofTags.0") && (k==2))
                    ) {
                        errors.push("Dice roll found in text. Use dicerolls instead. ("+root+") "+k+" = "+n[k]);
                    } else if (
                        k!="id" &&
                        !isSentenceWhitelisted(n[k]) &&
                        !n[k].startsWith("samplestat-") && (
                            (n[k].match(/strength/i) ||
                            n[k].match(/agility/i) ||
                            n[k].match(/presence/i) ||
                            n[k].match(/toughness/i)) &&
                            !root.startsWith("stat-") &&
                            !n[k].startsWith("stat-") &&
                            !n[k].startsWith("$.") &&
                            !n[k].match(/agilityStat/)
                        )
                    ) {
                        errors.push("Stat name found in text. Use placeholders instead. ("+root+") "+k+" = "+n[k]);
                    } else if (
                        n[k].match(/dr[ 0-9]+/i)
                    ) {
                        errors.push("("+root+") "+k+" = "+n[k]);
                    }
                } else if (typeof n[k] == "object") {
                    if (k == "requires") {
                        n[k].forEach(request=>{
                            let
                                isStatReference = !n.id.startsWith("statset-") && ((request.id.substr(0,2)!="$.") && (request.id.endsWith("Stat") || (request.ofTags && request.ofTags[0][0].indexOf("stat")!=-1) || (request.ofTagBags && request.ofTagBags[0][0].indexOf("stat")!=-1)));

                            if (isStatReference) {
                                if (!request.reuse) {
                                    errors.push("Missing reuse in stat request ("+root+") "+k+" = "+JSON.stringify(n[k]));
                                }
                                if (!request.ofTags) {
                                    errors.push("Missing ofTags in stat request ("+root+") "+k+" = "+JSON.stringify(n[k]));
                                } else {
                                    let
                                        requestedStat = 0,
                                        foundComponents = {};
                                    request.ofTags.forEach(request=>{
                                        if (request.length == 1) {
                                            let
                                                parts = request[0].split("-");
                                            if ((parts.length == 2) || (parts.length == 3) || (parts.length == 4)) {
                                                let
                                                    component = (parts[2] || "base")+(parts[3] || "-base");
                                                if (!requestedStat)
                                                    requestedStat = parts[1];
                                                if (!parts[component]) {
                                                    foundComponents[component] = true;
                                                } else {
                                                    errors.push("Duplicated stat request tag "+component+" ("+root+") "+k+" = "+JSON.stringify(n[k]));        
                                                }
                                            } else {
                                                errors.push("Invalid stat part name "+request[0]+" ("+parts.length+") in tags ("+root+") "+k+" = "+JSON.stringify(n[k]));    
                                            }
                                        } else {
                                            errors.push("Invalid stat request tag length ("+root+") "+k+" = "+JSON.stringify(n[k]));
                                        }
                                    })
                                    if (!foundComponents["base-base"]) {
                                        errors.push("Missing base stat tag ("+root+") "+k+" = "+JSON.stringify(n[k]));
                                    }
                                    if (!foundComponents["simple-base"]) {
                                        errors.push("Missing simple stat tag ("+root+") "+k+" = "+JSON.stringify(n[k]));
                                    }
                                    if (!foundComponents["simplealt"]) {
                                        errors.push("Missing simple-alt stat tag ("+root+") "+k+" = "+JSON.stringify(n[k]));
                                    }
                                    if (request.id!=(requestedStat+"Stat")) {
                                        errors.push("Bad stat request ID ("+root+") "+k+" = "+JSON.stringify(n[k]));
                                    }
                                    if (!infos.virtualStats[requestedStat])
                                        infos.virtualStats[requestedStat] = 0;
                                    infos.virtualStats[requestedStat]++;
                                }
                            }
                            // { id: "agilityStat", reuse: true, ofTags: [ [ "stat-agility" ], [ "stat-agility-simple" ], [ "stat-agility-simple-alt" ] ] }

                        })
                    }
                    find(n[k],root+"."+k);
                } else if (typeof n[k] == "function") {
                    if (
                        !root.startsWith("roll-")
                    ) {
                        errors.push("JS function found. Even if supported, avoid using them. ("+root+") "+k+" = [CODE]");
                    }
                }
            }
        }

        DATABASE.forEach(entry=>{
            find(entry,entry.id);
            if (!entry.tags)
                errors.push("Missing tags for: "+entry.id);
        })

        return {
            infos:infos,
            errors:errors
        };
        
    }

    function makeStatsMap() {
        let
            errors = [],
            columns = [],
            map = {},
            summary = {},
            samples = {};
            
        DATABASE.forEach(entry=>{
            if (entry.id.startsWith("samplestat-")) {
                entry.tags.forEach(tag=>{
                    if (tag!="samplestat") {
                        let
                            parts = tag.split("-"),
                            statid = "stat-"+parts[1]+"-simple",
                            name = entry.render.EN,
                            id = parts[3] || 0;

                        if (entry.tags.length>2)
                            name="<u>"+name+"</u>";

                        if (!samples[statid])
                            samples[statid] = [];
                        if (!samples[statid][id])
                            samples[statid][id] = [];
                        samples[statid][id].push(name);
                    }
                })
            }
            if (entry.id.startsWith("stat-")) {
                if (!map[entry.id]) {
                    map[entry.id] = {};
                }
                entry.tags.forEach(tag=>{
                    if ((tag!="stat") && (tag!="burden-affected")) {
                        let
                            section,
                            parts = tag.split("-"),
                            linkedStat = "stat-"+parts[1];

                        if (columns.indexOf(linkedStat)==-1)
                            columns.push(linkedStat);

                        if (!summary[linkedStat])
                            summary[linkedStat] = {};

                        switch (parts.length) {
                            case 2:{
                                section = "base";
                                if (map[entry.id][linkedStat]) {
                                    console.warn("Duplicate base stat", tag, entry);
                                } else {
                                    map[entry.id][linkedStat] = section;
                                }
                                break
                            }
                            case 3:{
                                if (parts[2] == "simple") {
                                    section = "simple";
                                    if (map[entry.id][linkedStat]) {
                                        console.warn("Duplicate simple stat", tag, entry);
                                    } else {
                                        map[entry.id][linkedStat] = section;
                                    }
                                } else {
                                    console.warn("Bad tag in stat entry", tag, entry);
                                }
                                break;
                            }
                            case 4:{
                                if ((parts[2] == "simple") && (parts[3]=="alt")) {
                                    section = "alt";
                                    if (map[entry.id][linkedStat]) {
                                        console.warn("Duplicate simple-alt stat", entry);
                                    } else {
                                        if ((entry.id!="stat-strength-simple") && (entry.id!="stat-agility-simple"))
                                            errors.push("Stat "+entry.id+" cannot be ALT. Only stat-strength-simple and stat-agility-simple");
                                        map[entry.id][linkedStat] = section;
                                    }
                                } else {
                                    console.warn("Bad tag in stat-alt entry", tag, entry);
                                }
                                break;
                            }
                            default:{
                                console.warn("Bad tag in stat entry", tag, entry);
                            }
                        }
                    
                        if (section)
                            if (summary[linkedStat][section]) {
                                errors.push("Duplicate "+section+" for stat "+linkedStat);
                            } else
                                summary[linkedStat][section] = entry.id;
                    }
                })
            }
        })

        for (let k in summary) {
            if ((k=="stat-strength")||(k=="stat-agility")) {
                if (!summary[k].base) {
                    summary[k].error = true;
                    errors.push("Missing base stat for "+k);
                }
                if (summary[k].simple) {
                    summary[k].error = true;
                    errors.push("Can't have simple stat for "+k);
                }
                if (summary[k].alt) {
                    summary[k].error = true;
                    errors.push("Can't have simple-alt stat for "+k);
                }
            } else {
                /*
                if (!summary[k].base) {
                    summary[k].error = true;
                    errors.push("Missing base stat for "+k);
                }
                if (!summary[k].simple) {
                    summary[k].error = true;

                    summary[k].error = true;
                    errors.push("Invalid simple-alt stat. Must be stat-strength-simple or stat-agility-simple. "+k);

                }
                */
               if (!summary[k].alt) {
                    summary[k].error = true;
                    errors.push("Missing simple-alt stat for "+k);
                }
            }
        }
            
        return {
            samples:samples,
            summary:summary,
            columns:columns,
            errors:errors,
            map: map
        }
    }

    let
        tools = document.createElement("tools"),
        exporter = document.createElement("span"),
        importer = document.createElement("span"),
        hr1 = document.createElement("hr"),
        hr2 = document.createElement("hr"),
        hr3 = document.createElement("hr"),
        ui = document.createElement("div");

    tools.innerHTML="Tools: ";
    exporter.innerHTML="Export: ";
    importer.innerHTML="Import: ";
    document.body.appendChild(tools);
    document.body.appendChild(hr1);
    document.body.appendChild(exporter);
    document.body.appendChild(hr2);
    document.body.appendChild(importer);
    document.body.appendChild(hr3);
    document.body.appendChild(ui);

    for (let k in TOOLS) {
        let
            button = document.createElement("button");

        button.onclick = ()=>{
            ui.innerHTML = "";
            TOOLS[k](ui);
        }

        button.innerHTML = k;
        tools.appendChild(button);
    }

    for (let k in DATASETS) {
        let
            exportbutton = document.createElement("button"),
            importbutton = document.createElement("button");

        importbutton.innerHTML = exportbutton.innerHTML = k;
        exportbutton.onclick=(cl)=>{
            let
                title = document.createElement("h1"),
                ta = document.createElement("textarea");

            ta.cols = 100;
            ta.rows = 30;
            ui.innerHTML = "";
            title.innerHTML = "Export "+k;
            ui.appendChild(title);
            ta.value = exportDataset(DATASETS[k]);
            ui.appendChild(ta);

        }

        importbutton.onclick=(cl)=>{
            let
                title = document.createElement("h1"),
                p = document.createElement("p"),
                err = document.createElement("div"),
                ta = document.createElement("textarea"),
                hr = document.createElement("hr"),
                bu = document.createElement("button");

            ta.cols = 100;
            ta.rows = 30;
            err.style.backgroundColor="#f00";
            err.style.color="#fff";
            ui.innerHTML = "";
            bu.innerHTML = title.innerHTML = "Import "+k;
            p.innerHTML = DATASETS[k].import.notes;
            ui.appendChild(title);
            ui.appendChild(p);
            ui.appendChild(ta);
            ui.appendChild(hr);
            ui.appendChild(err);
            ui.appendChild(bu);
            bu.onclick=()=>{
                let
                    result = importDataset(DATASETS[k], ta.value);
                err.innerHTML = result.errors.join("<br>");
                ta.value = result.json;
            }

        }
        
        exporter.appendChild(exportbutton);
        importer.appendChild(importbutton);
    }

    TOOLS.overview(ui);

}


</script></html>
